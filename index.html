<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEGA X — Proyecto Final Aplicaciones Web</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

  <div id="game-container"></div>

  <!-- Controles táctiles -->
  <div id="mobile-controls">
    <div class="dpad">
      <div class="dpad-row">
        <div class="btn-spacer"></div>
        <div class="btn-touch" id="btn-up">▲</div>
        <div class="btn-spacer"></div>
      </div>
      <div class="dpad-row">
        <div class="btn-touch" id="btn-left">◀</div>
        <div class="btn-touch" id="btn-down">▼</div>
        <div class="btn-touch" id="btn-right">▶</div>
      </div>
    </div>

    <div class="action-btns">
      <div class="action-row">
        <div class="btn-action btn-dash"  id="btn-dash">💨</div>
        <div class="btn-action btn-jump"  id="btn-jump">▲</div>
      </div>
      <div class="action-row">
        <div class="btn-action btn-shoot" id="btn-shoot">🔫</div>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
